<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liga Beach Tennis - Campeonatos</title>
    <style>
        /* Variáveis de Cores (Estilo esportivo/LetzPlay) */
        :root {
            --primary: #00d26a;
            --primary-dark: #00a653;
            --dark: #1a1a1a;
            --light: #f4f7f6;
            --gray: #888;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--light);
            color: var(--dark);
        }

        /* Navbar */
        header {
            background-color: var(--dark);
            color: var(--white);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            color: var(--primary);
            font-size: 1.5rem;
        }

        .btn {
            background-color: var(--primary);
            color: var(--dark);
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background-color: var(--primary-dark);
            color: var(--white);
        }

        .btn-outline {
            background-color: transparent;
            color: var(--primary);
            border: 1px solid var(--primary);
        }

        /* Container Principal */
        main {
            padding: 2rem 5%;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Seções */
        .section-title {
            margin-bottom: 1.5rem;
            font-size: 1.8rem;
            border-bottom: 2px solid var(--primary);
            display: inline-block;
            padding-bottom: 0.3rem;
        }

        /* Grid de Torneios (Visão Pública) */
        .tournaments-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .tournament-card {
            background-color: var(--white);
            border-radius: 10px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-left: 5px solid var(--primary);
        }

        .tournament-card h3 {
            margin-bottom: 0.5rem;
        }

        .tournament-card p {
            color: var(--gray);
            font-size: 0.9rem;
            margin-bottom: 0.3rem;
        }

        .badge {
            display: inline-block;
            background-color: #eee;
            padding: 0.2rem 0.5rem;
            border-radius: 3px;
            font-size: 0.8rem;
            margin-top: 0.5rem;
            font-weight: bold;
        }

        /* Formulário de Criação (Área Logada) */
        #create-section {
            background-color: var(--white);
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: none; /* Escondido por padrão */
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }

        .form-control {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .radio-group {
            display: flex;
            gap: 1rem;
            margin-top: 0.5rem;
        }

        /* Utilitários */
        .hidden {
            display: none !important;
        }
        /* Tela de Detalhes do Campeonato */
        #details-section {
            background-color: var(--white);
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .panel-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-top: 1.5rem;
        }

        .panel-card {
            background-color: var(--light);
            padding: 1.5rem;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        .lista-inscritos {
            list-style: none;
            margin-top: 1rem;
        }

        .lista-inscritos li {
            background: var(--white);
            padding: 0.5rem;
            margin-bottom: 0.5rem;
            border-radius: 5px;
            border-left: 3px solid var(--primary);
        }
        
        /* Modificador para o card ser clicável */
        .tournament-card {
            cursor: pointer;
            transition: transform 0.2s;
        }
        .tournament-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary-dark);
        }
    </style>
</head>
<body>

    <header>
        <h1>🎾 Beach Tennis Pro</h1>
        <div id="auth-area">
            <button id="btnLogin" class="btn btn-outline">Fazer Login</button>
            <div id="user-menu" class="hidden">
                <span style="margin-right: 15px;">Olá, Organizador</span>
                <button id="btnNewTournament" class="btn">Novo Torneio</button>
                <button id="btnLogout" class="btn btn-outline" style="margin-left: 10px;">Sair</button>
            </div>
        </div>
    </header>

    <main>
        <section id="create-section">
            <h2 class="section-title">Criar Novo Campeonato</h2>
            <form id="tournament-form">
                <div class="form-group">
                    <label for="nomeTorneio">Nome do Campeonato</label>
                    <input type="text" id="nomeTorneio" class="form-control" placeholder="Ex: Liga Premier - Etapa 1" required>
                </div>

                <div class="form-group">
                    <label for="rankingVinculado">Vincular a qual Ranking?</label>
                    <select id="rankingVinculado" class="form-control" required>
                        <option value="">Selecione um ranking...</option>
                        <option value="ranking-geral">Ranking Geral (Simples)</option>
                        <option value="ranking-duplas-fixas">Ranking Duplas Fixas</option>
                        <option value="ranking-elite">Liga Beach Tennis Elite</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Formato de Disputa</label>
                    <div class="radio-group">
                        <label><input type="radio" name="formato" value="mata-mata" required> Apenas Mata-Mata</label>
                        <label><input type="radio" name="formato" value="grupos-mata" required> Fase de Grupos + Mata-Mata</label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="qtdSets">Quantidade de Sets (Formato das Partidas)</label>
                    <select id="qtdSets" class="form-control" required>
                        <option value="1-set-6">1 Set (até 6 games)</option>
                        <option value="1-set-8">1 Set Pro (até 8 games)</option>
                        <option value="melhor-de-3-short">Melhor de 3 (Short Sets)</option>
                        <option value="melhor-de-3">Melhor de 3 (Normal)</option>
                    </select>
                </div>

                <button type="submit" class="btn">Salvar Campeonato</button>
                <button type="button" id="btnCancelCreate" class="btn btn-outline" style="margin-left: 10px;">Cancelar</button>
            </form>
        </section>

        <section id="list-section">
            <h2 class="section-title">Campeonatos Abertos</h2>
            <div class="tournaments-grid" id="tournaments-container">
                </div>
        </section>
        <section id="details-section" class="hidden">
            <button id="btnVoltar" class="btn btn-outline" style="margin-bottom: 1rem;">⬅ Voltar para a Lista</button>
            
            <h2 class="section-title" id="detalhe-nome-torneio">Nome do Torneio</h2>
            <p><strong id="detalhe-formato-torneio">Formato: </strong></p>

            <div class="panel-grid">
                <div class="panel-card">
                    <h3>👥 Gerenciar Inscritos</h3>
                    <div class="form-group" style="margin-top: 10px;">
                        <input type="text" id="nomeJogador1" class="form-control" placeholder="Nome do Jogador 1 (Obrigatório)" style="margin-bottom: 8px;">
                        <input type="text" id="nomeJogador2" class="form-control" placeholder="Nome do Jogador 2 (Deixe em branco se for Simples)">
                        <button id="btnAddInscrito" class="btn" style="margin-top: 10px; width: 100%;">Adicionar Inscrição</button>
                    </div>
                    <ul class="lista-inscritos" id="listaInscritosUI">
                        </ul>
                </div>

                <div class="panel-card">
                    <h3>🏆 Chaves e Grupos</h3>
                    <p style="color: var(--gray); margin-bottom: 15px; font-size: 0.9rem;">
                        Adicione os jogadores primeiro para depois gerar os confrontos.
                    </p>
                    <button id="btnGerarChaves" class="btn" style="width: 100%; background-color: var(--dark); color: var(--white);">
                        ⚙️ Gerar Chaves / Grupos
                    </button>
                    <div id="chavesGeradasUI" style="margin-top: 15px;"></div>
                    </button>
                </div>
            </div>
        </section>
    </main>

    <script type="module">
        // 1. Importando os módulos do Firebase (Versão Modular V9+)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // 2. SUA CONFIGURAÇÃO DO FIREBASE (Você precisa substituir esses dados depois!)
        const firebaseConfig = {
              apiKey: "AIzaSyAxR4s-2QfbKS0mmzsx_bUPQcJ0f5kykZQ",
              authDomain: "rankingbt-b48ed.firebaseapp.com",
              projectId: "rankingbt-b48ed",
              storageBucket: "rankingbt-b48ed.firebasestorage.app",
              messagingSenderId: "363658176994",
              appId: "1:363658176994:web:11d677bfdfc12cb0c5f1bb",
        };

        // 3. Inicializando o Firebase e o Banco de Dados (Firestore)
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- ESTADO DA APLICAÇÃO ---
        let isLogged = false;

        // --- ELEMENTOS DO DOM ---
        const btnLogin = document.getElementById('btnLogin');
        const btnLogout = document.getElementById('btnLogout');
        const userMenu = document.getElementById('user-menu');
        const btnNewTournament = document.getElementById('btnNewTournament');
        const createSection = document.getElementById('create-section');
        const btnCancelCreate = document.getElementById('btnCancelCreate');
        const form = document.getElementById('tournament-form');
        const tournamentsContainer = document.getElementById('tournaments-container');

        // --- FUNÇÕES DE INTERFACE ---
        function updateAuthUI() {
            if (isLogged) {
                btnLogin.classList.add('hidden');
                userMenu.classList.remove('hidden');
            } else {
                btnLogin.classList.remove('hidden');
                userMenu.classList.add('hidden');
                createSection.style.display = 'none';
            }
        }

// --- ELEMENTOS DO PAINEL DE DETALHES ---
        const listSection = document.getElementById('list-section');
        const detailsSection = document.getElementById('details-section');
        const btnVoltar = document.getElementById('btnVoltar');
        const tituloDetalhe = document.getElementById('detalhe-nome-torneio');
        const formatoDetalhe = document.getElementById('detalhe-formato-torneio');
        
        let torneioAbertoId = null; // Guarda o ID do torneio que estamos visualizando

        // --- FIREBASE: LENDO OS DADOS EM TEMPO REAL ---
        const q = query(collection(db, "campeonatos"), orderBy("dataCriacao", "desc"));
        
        onSnapshot(q, (snapshot) => {
            tournamentsContainer.innerHTML = ''; 
            
            if (snapshot.empty) {
                tournamentsContainer.innerHTML = '<p>Nenhum campeonato aberto no momento.</p>';
                return;
            }

            snapshot.forEach((doc) => {
                const camp = doc.data();
                const card = document.createElement('div');
                card.className = 'tournament-card';
                // Adicionamos a função de clique direto no card, passando os dados e a ID do Firebase (doc.id)
                card.onclick = () => abrirPainelTorneio(doc.id, camp.nome, camp.formato);
                
                card.innerHTML = `
                    <h3>${camp.nome}</h3>
                    <p><strong>Ranking:</strong> ${camp.ranking}</p>
                    <p><strong>Formato:</strong> ${camp.formato}</p>
                    <span class="badge">🎾 ${camp.sets}</span>
                `;
                tournamentsContainer.appendChild(card);
            });
        });

        // --- FUNÇÕES DE NAVEGAÇÃO DO PAINEL ---
        function abrirPainelTorneio(id, nome, formato) {
            torneioAbertoId = id; 
            tituloDetalhe.textContent = nome;
            formatoDetalhe.textContent = `Formato: ${formato}`;
            
            listSection.classList.add('hidden');
            createSection.style.display = 'none';
            detailsSection.classList.remove('hidden');

            // CHAMA A FUNÇÃO DE CARREGAR OS INSCRITOS DESTE TORNEIO:
            carregarInscritos(id);
            let inscritosUnsubscribe = null;
        let inscritosAtuais = []; // <-- NOVA VARIÁVEL AQUI

        function carregarInscritos(torneioId) {
            const listaUI = document.getElementById('listaInscritosUI');
            listaUI.innerHTML = 'Carregando...';

            const inscritosRef = collection(db, "campeonatos", torneioId, "inscritos");
            const qInscritos = query(inscritosRef, orderBy("dataCriacao", "asc"));

            inscritosUnsubscribe = onSnapshot(qInscritos, (snapshot) => {
                listaUI.innerHTML = ''; 
                inscritosAtuais = []; // <-- LIMPA A LISTA ANTES DE PREENCHER DE NOVO
                
                if(snapshot.empty) {
                    listaUI.innerHTML = '<li style="background: transparent; border: none; color: var(--gray);">Nenhum inscrito ainda.</li>';
                    return;
                }

                snapshot.forEach((docSnap) => {
                    const dados = docSnap.data();
                    inscritosAtuais.push(dados); // <-- GUARDA OS DADOS PARA O SORTEIO
                    
                    const li = document.createElement('li');
                    if (dados.jogador2) {
                        li.innerHTML = `🎾 <strong>${dados.jogador1}</strong> e <strong>${dados.jogador2}</strong>`;
                    } else {
                        li.innerHTML = `🎾 <strong>${dados.jogador1}</strong>`;
                    }
                    listaUI.appendChild(li);
                });
            });
        }
        }

        btnVoltar.addEventListener('click', () => {
            torneioAbertoId = null;
            detailsSection.classList.add('hidden');
            listSection.classList.remove('hidden');

            // DESLIGA O FIREBASE PARA ESSA LISTA DE INSCRITOS
            if (inscritosUnsubscribe) {
                inscritosUnsubscribe();
            }
        });

        // --- FIREBASE: SALVANDO UM NOVO CAMPEONATO ---
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btnSubmit = form.querySelector('button[type="submit"]');
            btnSubmit.textContent = 'Salvando...';
            btnSubmit.disabled = true;

            try {
                const novoCamp = {
                    nome: document.getElementById('nomeTorneio').value,
                    ranking: document.getElementById('rankingVinculado').options[document.getElementById('rankingVinculado').selectedIndex].text,
                    formato: document.querySelector('input[name="formato"]:checked').parentElement.textContent.trim(),
                    sets: document.getElementById('qtdSets').options[document.getElementById('qtdSets').selectedIndex].text,
                    dataCriacao: serverTimestamp()
                };

                await addDoc(collection(db, "campeonatos"), novoCamp);
                form.reset();
                createSection.style.display = 'none';
                alert('Campeonato criado com sucesso!');
            } catch (error) {
                console.error("Erro ao salvar:", error);
                alert('Erro ao criar campeonato. Verifique o console.');
            } finally {
                btnSubmit.textContent = 'Salvar Campeonato';
                btnSubmit.disabled = false;
            }
        });

        // --- EVENTOS DE BOTÕES SIMPLES ---
        btnLogin.addEventListener('click', () => { isLogged = true; updateAuthUI(); });
        btnLogout.addEventListener('click', () => { isLogged = false; updateAuthUI(); detailsSection.classList.add('hidden'); listSection.classList.remove('hidden'); });
        btnNewTournament.addEventListener('click', () => { createSection.style.display = 'block'; detailsSection.classList.add('hidden'); listSection.classList.remove('hidden'); });
        btnCancelCreate.addEventListener('click', () => { createSection.style.display = 'none'; form.reset(); });

        updateAuthUI();
        // --- LÓGICA DE INSCRIÇÕES (JOGADORES INDIVIDUAIS/DUPLAS) ---
        let inscritosUnsubscribe = null; // Variável para desligar a leitura quando sair da tela

        function carregarInscritos(torneioId) {
            // Limpa a lista na tela
            const listaUI = document.getElementById('listaInscritosUI');
            listaUI.innerHTML = 'Carregando...';

            // Busca os inscritos apenas DENTRO do torneio específico
            const inscritosRef = collection(db, "campeonatos", torneioId, "inscritos");
            const qInscritos = query(inscritosRef, orderBy("dataCriacao", "asc"));

            inscritosUnsubscribe = onSnapshot(qInscritos, (snapshot) => {
                listaUI.innerHTML = ''; // Limpa antes de preencher
                
                if(snapshot.empty) {
                    listaUI.innerHTML = '<li style="background: transparent; border: none; color: var(--gray);">Nenhum inscrito ainda.</li>';
                    return;
                }

                snapshot.forEach((docSnap) => {
                    const dados = docSnap.data();
                    const li = document.createElement('li');
                    
                    // Se tiver jogador 2, mostra a dupla. Se não, mostra só o J1.
                    if (dados.jogador2) {
                        li.innerHTML = `🎾 <strong>${dados.jogador1}</strong> e <strong>${dados.jogador2}</strong>`;
                    } else {
                        li.innerHTML = `🎾 <strong>${dados.jogador1}</strong>`;
                    }
                    
                    listaUI.appendChild(li);
                });
            });
        }

        // Evento de clicar no botão "Adicionar Inscrição"
        document.getElementById('btnAddInscrito').addEventListener('click', async () => {
            const j1 = document.getElementById('nomeJogador1').value.trim();
            const j2 = document.getElementById('nomeJogador2').value.trim();

            if (!j1) {
                alert("Preencha pelo menos o nome do Jogador 1!");
                return;
            }

            const btnAdd = document.getElementById('btnAddInscrito');
            btnAdd.textContent = 'Salvando...';
            btnAdd.disabled = true;

            try {
                // Salva no Firebase criando os campos individuais
                await addDoc(collection(db, "campeonatos", torneioAbertoId, "inscritos"), {
                    jogador1: j1,
                    jogador2: j2,
                    dataCriacao: serverTimestamp()
                });

                // Limpa os campos após salvar
                document.getElementById('nomeJogador1').value = '';
                document.getElementById('nomeJogador2').value = '';
            } catch (error) {
                console.error("Erro ao inscrever:", error);
                alert("Erro ao adicionar jogador.");
            } finally {
                btnAdd.textContent = 'Adicionar Inscrição';
                btnAdd.disabled = false;
            }
        });
        // --- GERADOR DE CHAVES (SORTEIO MATA-MATA) ---
        document.getElementById('btnGerarChaves').addEventListener('click', () => {
            const chavesUI = document.getElementById('chavesGeradasUI');
            
            if (inscritosAtuais.length < 2) {
                alert("É preciso ter pelo menos 2 inscrições (jogadores ou duplas) para gerar uma chave!");
                return;
            }

            // 1. Embaralha a lista de inscritos aleatoriamente
            const sorteados = [...inscritosAtuais].sort(() => Math.random() - 0.5);

            // 2. Monta o visual dos confrontos
            let htmlConfrontos = '<h4 style="margin-bottom: 10px; border-bottom: 1px solid #ccc; padding-bottom: 5px;">⚔️ 1ª Rodada (Sorteio)</h4>';
            htmlConfrontos += '<ul class="lista-inscritos">';

            for (let i = 0; i < sorteados.length; i += 2) {
                // Formata o nome do Time A
                let timeA = sorteados[i].jogador2 ? `${sorteados[i].jogador1} / ${sorteados[i].jogador2}` : sorteados[i].jogador1;
                
                // Formata o nome do Time B (ou dá vitória por W.O/Bye se for ímpar)
                let timeB = "<em>Avança direto (BYE)</em>";
                if (sorteados[i+1]) {
                    timeB = sorteados[i+1].jogador2 ? `${sorteados[i+1].jogador1} / ${sorteados[i+1].jogador2}` : sorteados[i+1].jogador1;
                }

                htmlConfrontos += `
                    <li style="text-align: center; background-color: #f9f9f9; border-left: 4px solid var(--dark);">
                        <span style="color: var(--primary-dark); font-weight: bold;">${timeA}</span>
                        <div style="margin: 5px 0; font-size: 0.8rem; color: var(--gray);">VS</div>
                        <span style="color: var(--dark); font-weight: bold;">${timeB}</span>
                    </li>
                `;
            }

            htmlConfrontos += '</ul>';
            
            // 3. Joga na tela
            chavesUI.innerHTML = htmlConfrontos;
            
            // (Opcional) Aqui futuramente você pode colocar um addDoc() para salvar esse sorteio no Firebase!
        });
    </script>
</body>
</html>
